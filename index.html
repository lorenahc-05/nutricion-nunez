<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>No disponible</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #msg {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        padding: 0 8vw;
        text-align: center;
        color: #fff;
        font-family: -apple-system, sans-serif;
        font-size: clamp(24px, 6vw, 48px);
        font-weight: 900;
        letter-spacing: 0.5px;
        line-height: 1.3;
        opacity: 0;
        transform: scale(0.85);
        transition: opacity 0.6s ease, transform 0.6s ease;
      }
      #msg.show {
        opacity: 1;
        transform: scale(1);
      }
    </style>

    <!-- Vercel Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <div id="msg">ERROR POPOPOPO</div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
      }
      if ('caches' in window) {
        caches.keys().then(names => names.forEach(n => caches.delete(n)));
      }

      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('msg').classList.add('show')
        }, 150)
      })

      // Registro de visita en Google Sheets
      var params = new URLSearchParams(window.location.search)
      var ref = params.get('ref') || 'sin-ref'

      fetch('https://script.google.com/macros/s/AKfycbw_dSCB2oB2efiZQ2aEUfBZAObe_f6ghiclACRrGqeckF1_n11zXi30KMKcpKWndqM/exec', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          ref: ref,
          userAgent: navigator.userAgent,
          referrer: document.referrer,
          idioma: navigator.language
        })
      }).catch(() => {})
    </script>
  </body>
</html>
